name: MacRemoteServer
options:
  bundleIdPrefix: com.macremote
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
targets:
  MacRemoteServer:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - project.yml
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macremote.server
        PRODUCT_NAME: MacRemote Server
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: ""
        ENABLE_APP_SANDBOX: NO
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: true
        SWIFT_OBJC_BRIDGING_HEADER: BrightnessBridge.h
