name: MacRemote
options:
  bundleIdPrefix: com.macremote
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic

targets:
  MacRemote:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macremote.client
        PRODUCT_NAME: MacRemote
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: true
        TARGETED_DEVICE_FAMILY: "1"  # Только iPhone
